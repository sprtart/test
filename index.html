<script>
// ==========================================
// ОБЪЕКТ PLATFORM (ТОЛЬКО VK И LOCAL)
// ==========================================
const Platform = {
    id: 'local', // По умолчанию работаем локально

    async init() {
            // 1. Проверяем наличие моста
            if (typeof vkBridge !== 'undefined') {
                
            // 1. Сначала ПОДПИСЫВАЕМСЯ
vkBridge.subscribe((e) => {
    if (e.detail.type === 'VKWebAppUpdateConfig') {
        const data = e.detail.data;
        // Если пользователь НЕ менял тему в игре вручную, слушаемся приложение ВК
        if (!localStorage.getItem('user-theme')) {
            if (data.appearance === 'dark' || data.appearance === 'space_gray') {
                document.documentElement.classList.add('dark-mode');
            } else {
                document.documentElement.classList.remove('dark-mode');
            }
            updateThemeIcons();
        }
    }
});

            try {
                // 2. Только потом ИНИЦИАЛИЗИРУЕМ
                await vkBridge.send('VKWebAppInit');
                this.id = 'vk';
                    // 3. Сразу запрашиваем данные пользователя
                    const userData = await vkBridge.send('VKWebAppGetUserInfo');
                    this.user = userData; // Сохраняем объект пользователя внутри Platform

                    console.log("Платформа: ВКонтакте. Игрок:", this.user.first_name);
                    return; 
                } catch (e) {
                    console.warn("Ошибка при инициализации VK SDK:", e);
                    // Если произошла ошибка, проваливаемся в local
                }
            }

                    // 2. ДЛЯ ЛОКАЛЬНОЙ ВЕРСИИ (проверка системной темы)
        if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
            document.body.classList.add('dark-mode');
        }

            this.id = 'local';
            console.log("Платформа: Локальная (без SDK)");
        },

    getLang() {
        if (this.id === 'vk') {
            const urlParams = new URLSearchParams(window.location.search);
            const vkLang = urlParams.get('language'); // 0 - ру, 3 - англ
            if (vkLang === '0' || vkLang === 'ru') return 'ru';
            if (vkLang === '3' || vkLang === 'en') return 'en';
        }
        return navigator.language.slice(0, 2) === 'ru' ? 'ru' : 'en';
    },

 async getStats() {
        let stats = { score: 0, solved: 0, mistakes: 0, maxElo: 0 };
        if (this.id === 'vk') {
            try {
                // Запрашиваем новый ключ и старый для переноса очков
                const data = await vkBridge.send('VKWebAppStorageGet', { keys: ['chessStats', 'totalScore'] });
                const statsStr = data.keys.find(k => k.key === 'chessStats')?.value;
                const oldScoreStr = data.keys.find(k => k.key === 'totalScore')?.value;
                
                if (statsStr) {
                    stats = JSON.parse(statsStr); // Если уже есть новая стата
                } else if (oldScoreStr) {
                    stats.score = parseInt(oldScoreStr, 10); // Переносим старые очки игрока!
                }

vibrate(type) {
    if (this.id === 'vk') {

        if (type === 'error') {
            vkBridge.send('VKWebAppTapticNotificationOccurred', { type: 'error' }).catch(()=>{});

            vkBridge.send('VKWebAppTapticNotificationOccurred', { type: 'success' }).catch(()=>{});

            vkBridge.send('VKWebAppTapticImpactOccurred', { style: 'heavy' }).catch(()=>{});

            vkBridge.send('VKWebAppTapticImpactOccurred', { style: 'light' }).catch(()=>{});

async getSolvedIds() {
    let ids = [];
    
    // 1. Пытаемся взять данные из облака ВК
    if (this.id === 'vk') {
        try {
            const data = await vkBridge.send('VKWebAppStorageGet', { keys: ['chess_solved_ids'] });
            const cloudData = data.keys.find(k => k.key === 'chess_solved_ids')?.value;
            if (cloudData && cloudData !== "") {
                ids = JSON.parse(cloudData);
                console.log("Прогресс загружен из облака ВК");
                // Обновляем локальную копию на всякий случай
                localStorage.setItem('chess_solved_ids', cloudData);
                return ids;
            }
        } catch (e) {
            console.warn("Ошибка загрузки из облака ВК:", e);
        }
    }

    // 2. Если в облаке пусто или мы не в ВК, берем из localStorage
    try {
        const local = localStorage.getItem('chess_solved_ids');
        if (local) {
            ids = JSON.parse(local);
            console.log("Прогресс загружен локально");
        }
    } catch (e) { 
        console.error("Ошибка чтения localStorage");
    }
    
    return ids;
},

saveSolvedIds(idsArray) {

    if (dropdown.classList.contains('hidden')) {
        // Позиционируем меню прямо под кнопкой
        const rect = btn.getBoundingClientRect();
        dropdown.style.top = (rect.bottom + 10) + 'px';
        dropdown.style.right = (window.innerWidth - rect.right) + 'px'; // Выравниваем по правому краю кнопки
        dropdown.classList.remove('hidden');
    } else {
        dropdown.classList.add('hidden');
    }
    
    // Предотвращаем всплытие клика, чтобы меню не закрылось сразу же
    event.stopPropagation();
}

function isSquareUnderAttack(targetR, targetC, attackerIsWhite) {
    for (let r = 0; r < 8; r++) {
        for (let c = 0; c < 8; c++) {
            const piece = boardState[r][c];
            if (!piece) continue;

            const isPieceWhite = piece === piece.toUpperCase();
            if (isPieceWhite !== attackerIsWhite) continue;

            const p = piece.toLowerCase();
            const dr = Math.abs(targetR - r);
            const dc = Math.abs(targetC - c);

            if (p === 'p') {
                const dir = isPieceWhite ? -1 : 1;
                if (targetR - r === dir && dc === 1) return true;
            } else {
                if (isPossibleMove(r, c, targetR, targetC, piece, true)) return true;
            }
        }
    }
    return false;
}

function renderBoard() {
    boardEl.innerHTML = '';
    const range = (playerColor === 'b') ?[7, 6, 5, 4, 3, 2, 1, 0] :[0, 1, 2, 3, 4, 5, 6, 7];
    
    let checkedSquares =[];
    for (let r = 0; r < 8; r++) {
        for (let c = 0; c < 8; c++) {
            const piece = boardState[r][c];
            if (piece === 'K' && isSquareUnderAttack(r, c, false)) {
                checkedSquares.push(idxToPos(r, c));
            }
            if (piece === 'k' && isSquareUnderAttack(r, c, true)) {
                checkedSquares.push(idxToPos(r, c));
            }
        }
    }

    for (let r of range) {
        for (let c of range) {
            const sq = document.createElement('div');
            const pos = idxToPos(r, c);
            sq.className = `square ${(r + c) % 2 === 0 ? 'light' : 'dark'}`;
            sq.dataset.pos = pos;
            sq.dataset.r = r; 
            sq.dataset.c = c;
            
            if (lastMoveSquares.includes(pos)) sq.classList.add('enemy-move');
            if (selectedSq && selectedSq.pos === pos) sq.classList.add('selected');
            if (hintSquare === pos) sq.classList.add('hint-blink');
            if (checkedSquares.includes(pos)) sq.classList.add('in-check');


            const isLeftEdge = (playerColor === 'w' && c === 0) || (playerColor === 'b' && c === 7);
            if (isLeftEdge) {
                const numSpan = document.createElement('span');
                numSpan.className = 'coord coord-number';
                numSpan.textContent = 8 - r; // r=0 это 8-я горизонталь
                sq.appendChild(numSpan);
            }

            // Буквы (отображаем только на нижней горизонтали относительно зрителя)
            // При белых это r=7 (1-я горизонталь), при черных это r=0 (8-я горизонталь)
            const isBottomEdge = (playerColor === 'w' && r === 7) || (playerColor === 'b' && r === 0);
            if (isBottomEdge) {
                const letSpan = document.createElement('span');
                letSpan.className = 'coord coord-letter';
                letSpan.textContent = String.fromCharCode(97 + c); // 97 это 'a'
                sq.appendChild(letSpan);
            }

            const piece = boardState[r][c];
            if (piece) {
                const pEl = document.createElement('div');
                pEl.className = 'piece';
                pEl.style.backgroundImage = `url('${PIECE_IMAGES[piece]}')`;
                sq.appendChild(pEl);
            }
            
            sq.onmousedown = sq.ontouchstart = (e) => handleStart(e, r, c);
            boardEl.appendChild(sq);
        }
    }
    
    if (selectedSq) {
        const piece = boardState[selectedSq.r][selectedSq.c];
        if (piece) showHints(selectedSq.r, selectedSq.c, piece);
    }
}

let pendingPromotion = null;

function checkLogicMove(tr, tc) {
    const toPos = idxToPos(tr, tc);
    const fromPiece = boardState[selectedSq.r][selectedSq.c];
    const correctMove = puzzles[currentPuzzleIndex].moves[currentStep];

    if (fromPiece.toLowerCase() === 'p' && (tr === 0 || tr === 7)) {
        pendingPromotion = { tr, tc, toPos, fromPos: selectedSq.pos };

        const rect = targetSqEl.getBoundingClientRect();
        const dialog = document.getElementById('promotion-dialog');

        dialog.style.width = rect.width + 'px';
        dialog.style.left = rect.left + 'px';

        const isVisualTop = (playerColor === 'w' && tr === 0) || (playerColor === 'b' && tr === 7);

        if (isVisualTop) {
            dialog.style.top = rect.top + 'px';
            document.querySelector('.promotion-box').style.flexDirection = 'column';
        } else {
            dialog.style.top = (rect.top - rect.height * 3) + 'px';
            document.querySelector('.promotion-box').style.flexDirection = 'column-reverse';
        }

        document.querySelectorAll('.prom-option').forEach(opt => {
            opt.style.width = rect.width + 'px';
            opt.style.height = rect.width + 'px';
        });

        const isWhite = (fromPiece === 'P');
        const pieces = isWhite ?['Q', 'R', 'B', 'N'] : ['q', 'r', 'b', 'n'];
        document.getElementById('prom-q').style.backgroundImage = `url('${PIECE_IMAGES[pieces[0]]}')`;
        document.getElementById('prom-r').style.backgroundImage = `url('${PIECE_IMAGES[pieces[1]]}')`;
        document.getElementById('prom-b').style.backgroundImage = `url('${PIECE_IMAGES[pieces[2]]}')`;
        document.getElementById('prom-n').style.backgroundImage = `url('${PIECE_IMAGES[pieces[3]]}')`;

        dialog.classList.remove('hidden');
        return; 
    }

    const movePlayed = selectedSq.pos + toPos;
    if (movePlayed === correctMove) {
        playMove(correctMove, false);
        selectedSq = null; 
    } else {
        handleMoveError(selectedSq.pos, toPos);
    }
}

            if (ourPieceEl) ourPieceEl.style.opacity = '0';

            requestAnimationFrame(() => {
                follower.style.transition = 'left 0.25s ease-in-out, top 0.25s ease-in-out';
                follower.style.left = (fR.left + fR.width/2) + 'px';
                follower.style.top = (fR.top + fR.height/2) + 'px';
            });

            setTimeout(() => {
                follower.style.display = 'none';
                follower.style.transition = 'none';
                if (ourPieceEl) ourPieceEl.style.opacity = '1';
            }, 260);
        } else {
            document.querySelectorAll('.piece-badge').forEach(el => el.remove());
            boardState[posToIdx(fromPos).r][posToIdx(fromPos).c] = piece;
            boardState[posToIdx(toPos).r][posToIdx(toPos).c] = capturedPiece; // восстанавливаем фигуру соперника
            selectedSq = null;
            renderBoard();
        }
    }, 400);

    if (gameMode === 'survival') {
        //survivalStreak = 0;
        //document.getElementById('score-display').textContent = survivalStreak;
        
        const hintBtns = document.querySelectorAll('.btn-hint');

}
function selectPromotion(type) {
    document.getElementById('promotion-dialog').classList.add('hidden');
    
    if (!pendingPromotion) return;

    const moveWithPromotion = pendingPromotion.fromPos + pendingPromotion.toPos + type;
    const correctMove = puzzles[currentPuzzleIndex].moves[currentStep];

    if (moveWithPromotion === correctMove) {
        playMove(correctMove, false);
    } else {
        handleMoveError(pendingPromotion.fromPos, pendingPromotion.toPos);
    }

    pendingPromotion = null;
    selectedSq = null;
}

function playMove(moveStr, isOpponent) {
    const from = moveStr.substring(0, 2), to = moveStr.substring(2, 4);
    const f = posToIdx(from), t = posToIdx(to);
    lastMoveSquares = [from, to];

    if (isOpponent) {
        const fromSq = document.querySelector(`[data-pos="${from}"]`);
        const toSq = document.querySelector(`[data-pos="${to}"]`);
        const pieceEl = fromSq?.querySelector('.piece');
        if (pieceEl) {
            const fR = fromSq.getBoundingClientRect(), tR = toSq.getBoundingClientRect();
            fromSq.style.zIndex = "1000";
            pieceEl.style.transition = "transform 0.25s ease-in-out";
            pieceEl.style.transform = `translate(${tR.left - fR.left}px, ${tR.top - fR.top}px)`;
            setTimeout(() => finalizeMove(moveStr, isOpponent, f, t), 250);
            return;
        }
    }
    finalizeMove(moveStr, isOpponent, f, t);
}

function finalizeMove(moveStr, isOpponent, f, t) {
    // 1. Звуки и Вибрация
    if (boardState[t.r][t.c] !== "") {
        safePlaySound(audioCapture);
        if (!isOpponent) Platform.vibrate('capture'); // Вибрация при взятии
    } else {
        safePlaySound(audioMove);
        if (!isOpponent) Platform.vibrate('move');    // Обычная вибрация
    }

    // 2. Логика превращения пешки
    let piece = boardState[f.r][f.c];
    if (moveStr.length === 5) {
        const prom = moveStr[4];
        piece = (piece === piece.toUpperCase()) ? prom.toUpperCase() : prom.toLowerCase();
    }
    
    // 3. Рокировка
    if (piece.toLowerCase() === 'k' && Math.abs(f.c - t.c) === 2) {
        const rookCol = t.c > f.c ? [7, 5] : [0, 3];
        boardState[f.r][rookCol[1]] = boardState[f.r][rookCol[0]];
        boardState[f.r][rookCol[0]] = "";
    }
    
    boardState[t.r][t.c] = piece; 
    boardState[f.r][f.c] = "";
    currentStep++;
    renderBoard(); 
    
    if (isOpponent) { 
        isLocked = false; 
        Platform.gameplayStart(); 
    } else if (currentStep < puzzles[currentPuzzleIndex].moves.length) {
        // Промежуточный ход игрока
        isLocked = true;
        setTimeout(() => playMove(puzzles[currentPuzzleIndex].moves[currentStep], true), 600);
    } else {
        // --- ЗАДАЧА ПОЛНОСТЬЮ РЕШЕНА ---
        showPieceBadge(idxToPos(t.r, t.c), 'correct');
        const currentId = puzzles[currentPuzzleIndex].id; // Берем ID текущей задачи
        solvedIds.add(currentId);                         // Добавляем в локальный набор
        Platform.saveSolvedIds(Array.from(solvedIds));    // Сохраняем весь список в облако ВК
        
        const thisElo = Number(puzzles[currentPuzzleIndex].elo);
        const randomDelta = Math.floor(Math.random() * 16) + 80; 

        statsTotalSolved++; 

        if (gameMode === 'survival') {
            
            if (survivalFailed) {
                // Задача решена после ошибки — начинаем заново автоматически
                survivalFailed = false;
                setTimeout(() => startGameMode('survival'), 800);
                return;
            }

            survivalStreak++;
            document.getElementById('score-display').textContent = survivalStreak;
            
            if (survivalStreak > statsMaxStreak) {
                statsMaxStreak = survivalStreak;
                document.getElementById('user-max-rating').textContent = statsMaxStreak;
            }
            // Поднимаем сложность: чем дольше серия, тем выше Эло
        currentElo += Math.floor(Math.random() * 23) + 33;
        } else {
    // --- ЛОГИКА ОБЫЧНОГО РЕЖИМА --- else {
            // --- ЛОГИКА ОБЫЧНОГО РЕЖИМА ---
            if (!hasHint && !hasMistake) {
                if (Platform.vibrate) Platform.vibrate('success');
                statsFlawless++; 
                if (thisElo > statsMaxElo) {
                    statsMaxElo = thisElo;
                    document.getElementById('user-max-rating').textContent = statsMaxElo;
                }
                eloStandard += randomDelta;
                currentElo = eloStandard;
                
                let pointsToAdd = (previousPuzzleElo === null) ? 15 : Math.max(5, Math.abs(thisElo - previousPuzzleElo));
                totalScore += pointsToAdd; 
                document.getElementById('score-display').textContent = totalScore;
                showPointsAnimation(pointsToAdd); 
            } else if (hasMistake && !hasHint) {
                currentElo = Math.max(100, currentElo - randomDelta); 
            }
        }

        saveCurrentStats();
        previousPuzzleElo = thisElo;

        // Отправляем в Supabase только для обычного режима (пока что)
        if (gameMode === 'standard') {
            pushToGlobalLeaderboard(); 
        }
        pushToGlobalLeaderboard(); 

// ПЕРЕХОД К СЛЕДУЮЩЕЙ ЗАДАЧЕ С ПРОВЕРКОЙ РЕКЛАМЫ
        gamesPlayedSinceAd++;
        const now = Date.now();
        
        setTimeout(() => {
            Platform.gameplayStop(); // Останавливаем звуки

            // Проверяем: прошло ли 3 минуты И решено ли 3 задачи?
            if (gamesPlayedSinceAd >= GAMES_BEFORE_AD && (now - lastAdTime) >= AD_COOLDOWN_MS) {
                // Показываем рекламу перед следующей задачей
                Platform.showInterstitial(() => {
                    lastAdTime = Date.now();
                    gamesPlayedSinceAd = 0;
                    startPuzzle();
                });
            } else {
                // Иначе просто запускаем следующую задачу мгновенно
                startPuzzle();
            }
        }, 800);
    }
}

                const targetPos = idxToPos(tr, tc);

                if (targetSq) {

                }

function isPossibleMove(fr, fc, tr, tc, piece, isCheckTest = false) {
    if (fr === tr && fc === tc) return false;
    const p = piece.toLowerCase();
    const isW = piece === piece.toUpperCase();
    const dr = Math.abs(tr - fr);
    const dc = Math.abs(tc - fc);

    if (!isCheckTest) {
        if (boardState[tr][tc] !== "" && (boardState[tr][tc] === boardState[tr][tc].toUpperCase()) === isW) return false;
    }

    const clearPath = () => {
        const sR = Math.sign(tr - fr);
        const sC = Math.sign(tc - fc);
        let r = fr + sR;
        let c = fc + sC;
        while (r !== tr || c !== tc) {
            if (boardState[r][c] !== "") return false;
            r += sR; c += sC;
        }
        return true;
    };

    switch(p) {
        case 'p': 
            const dir = isW ? -1 : 1;
            if (!isCheckTest) {
                if (dc === 0 && tr - fr === dir && boardState[tr][tc] === "") return true;
                if (dc === 0 && tr - fr === 2 * dir && ((isW && fr === 6) || (!isW && fr === 1))) {
                    return boardState[tr][tc] === "" && boardState[fr + dir][fc] === "";
                }
            }
            if (dc === 1 && tr - fr === dir && (boardState[tr][tc] !== "" || isCheckTest)) return true;
            return false;
        case 'r': return (dr === 0 || dc === 0) && clearPath();
        case 'n': return (dr === 2 && dc === 1) || (dr === 1 && dc === 2);
        case 'b': return dr === dc && clearPath();
        case 'q': return (dr === dc || dr === 0 || dc === 0) && clearPath();
        case 'k': 
            if (dr <= 1 && dc <= 1) {
                if (isCheckTest) return true;
                if (isSquareUnderAttack(tr, tc, !isW)) return false;
                return true;
            }
            return false;
    }
    return false;
}

function parseFEN(f) {
    return f.split(' ')[0].split('/').map(r => {
        const row =[];
        for (let char of r) { if (isNaN(char)) row.push(char); else for (let i = 0; i < parseInt(char); i++) row.push(""); }
        return row;
    });
}

function posToIdx(p) { return { r: 8 - parseInt(p[1]), c: p.charCodeAt(0) - 97 }; }
function idxToPos(r, c) { return String.fromCharCode(97 + c) + (8 - r); }

function renderTopList(items) {
    const container = document.getElementById('leaderboard-container');
    container.innerHTML = '';
    
    if (!items || items.length === 0) {
    container.innerHTML = `<div style="text-align:center; padding:20px;">${i18n[lang].lbEmpty}</div>`;
            return;
    }

    // В ВК ID пользователя — это Platform.user.id
    const myId = (Platform.user && Platform.user.id) ? String(Platform.user.id) : null;
    let myOriginalRow = null;

    // 1. Отрисовываем всех игроков
    items.forEach((item, index) => {
        // ID из Supabase может быть строкой или числом, приводим к String
        const isMe = (myId && String(item.user_id) === myId);
        
        const row = document.createElement('div');
        row.className = `leaderboard-row ${isMe ? 'is-me' : ''}`;
        
        row.innerHTML = `
            <div class="rank-num">${index + 1}</div>
            <img class="top-avatar" src="${item.photo_100 || 'img/logo.png'}" alt="">
            <div class="top-name">${item.first_name}</div>
            <div class="top-score">${item.score}</div>
        `;
        container.appendChild(row);

        if (isMe) myOriginalRow = row;
    });

    // 2. Если мы нашли себя в списке, создаем "липкую" копию
    if (myOriginalRow) {
        const stickyRow = myOriginalRow.cloneNode(true);
        stickyRow.className = 'leaderboard-row is-me sticky-me';
        
        // Применяем стили отображения (как в Яндекс версии)
        Object.assign(stickyRow.style, {
            position: 'sticky',
            bottom: '0',
            top: 'auto',
            zIndex: '10',
            display: 'none', // Скрыта по умолчанию
            boxShadow: '0 -2px 8px rgba(0,0,0,0.2)',
            backgroundColor: 'var(--bg-color, #fff)'
        });
        
        container.appendChild(stickyRow);

        // 3. Логика появления через IntersectionObserver
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    // Если оригинал виден — прячем липкую
                    stickyRow.style.display = 'none';
                } else {
                    const rect = myOriginalRow.getBoundingClientRect();
                    const containerRect = container.getBoundingClientRect();

                    // Если мы ниже зоны видимости — показываем липкую снизу
                    if (rect.top > containerRect.bottom) {
                        stickyRow.style.display = 'flex';
                    } else {
                        // Если мы выше (пролистали) — скрываем
                        stickyRow.style.display = 'none';
                    }
                }
            });
        }, { root: container, threshold: 0.5 });

        observer.observe(myOriginalRow);
    }
}

// Фикс скролла лидерборда на мобильных (из Яндекс-версии)
(function() {
    let startY = 0;
    let startScrollTop = 0;

    document.addEventListener('touchstart', function(e) {
        const container = document.getElementById('leaderboard-container');
        // Проверяем, что нажатие произошло внутри списка лидеров
        if (container && container.contains(e.target)) {
            startY = e.touches[0].clientY;
            startScrollTop = container.scrollTop;
        }
    }, { passive: true });

    document.addEventListener('touchmove', function(e) {
        const container = document.getElementById('leaderboard-container');
        if (!container || !container.contains(e.target)) return;

        const deltaY = startY - e.touches[0].clientY;
        const newScrollTop = startScrollTop + deltaY;

        // Определяем границы прокрутки
        const maxScroll = container.scrollHeight - container.clientHeight;
        const atTop = newScrollTop <= 0;
        const atBottom = newScrollTop >= maxScroll;

        // Если мы скроллим ВНУТРИ списка (не дошли до краев)
        if (!atTop && !atBottom) {
            container.scrollTop = newScrollTop;
            // Блокируем стандартный скролл всей страницы браузером
            if (e.cancelable) e.preventDefault();
        } 
        // Если дошли до верха и тянем вниз
        else if (atTop && deltaY < 0) {
            container.scrollTop = 0;
            if (e.cancelable) e.preventDefault();
        } 
        // Если дошли до низа и тянем вверх
        else if (atBottom && deltaY > 0) {
            container.scrollTop = maxScroll;
            if (e.cancelable) e.preventDefault();
        }
    }, { passive: false }); // Важно: false позволяет вызывать preventDefault
})();
